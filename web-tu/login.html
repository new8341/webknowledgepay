<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 知识付费平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .form-transition {
            transition: all 0.3s ease;
        }
        .tab-active {
            background: #3b82f6;
            color: white;
        }
        .floating-label {
            transition: all 0.2s ease;
        }
        .input-focused .floating-label {
            transform: translateY(-1.5rem) scale(0.875);
            color: #3b82f6;
        }
        .social-btn:hover {
            transform: translateY(-2px);
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-4xl w-full">
        <!-- 顶部Logo -->
        <div class="text-center mb-8">
            <div class="flex items-center justify-center mb-4">
                <i class="fas fa-graduation-cap text-4xl text-blue-600 mr-3"></i>
                <span class="text-3xl font-bold text-gray-800">稀际课堂</span>
            </div>
            <p class="text-gray-600">专业的知识付费学习平台</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 bg-white rounded-2xl shadow-xl overflow-hidden">
            <!-- 左侧登录表单 -->
            <div class="p-8 lg:p-12">
                <!-- 标签页切换 -->
                <div class="flex bg-gray-100 rounded-lg p-1 mb-8">
                    <button class="tab-active flex-1 py-3 px-4 text-sm font-medium rounded-lg form-transition">
                        <i class="fas fa-sign-in-alt mr-2"></i>登录
                    </button>
                    <button class="flex-1 py-3 px-4 text-sm font-medium text-gray-600 rounded-lg hover:bg-gray-50 form-transition">
                        <i class="fas fa-user-plus mr-2"></i>注册
                    </button>
                </div>

                <!-- 登录表单 -->
                <div id="login-form">
                    <form class="space-y-6">
                        <!-- 手机号输入 -->
                        <div class="relative">
                            <div class="relative">
                                <input type="tel" id="phone" class="w-full px-4 py-4 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent peer" placeholder=" ">
                                <label for="phone" class="floating-label absolute left-4 top-4 text-gray-500 peer-placeholder-shown:top-4 peer-placeholder-shown:text-gray-500 peer-focus:top-0 peer-focus:text-blue-600 peer-focus:text-sm peer-focus:bg-white peer-focus:px-2">
                                    手机号
                                </label>
                                <div class="absolute right-4 top-4 text-gray-400">
                                    <i class="fas fa-mobile-alt"></i>
                                </div>
                            </div>
                        </div>

                        <!-- 密码输入 -->
                        <div class="relative">
                            <div class="relative">
                                <input type="password" id="password" class="w-full px-4 py-4 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent peer" placeholder=" ">
                                <label for="password" class="floating-label absolute left-4 top-4 text-gray-500 peer-placeholder-shown:top-4 peer-placeholder-shown:text-gray-500 peer-focus:top-0 peer-focus:text-blue-600 peer-focus:text-sm peer-focus:bg-white peer-focus:px-2">
                                    密码
                                </label>
                                <button type="button" class="absolute right-4 top-4 text-gray-400 hover:text-gray-600">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <!-- 记住登录和忘记密码 -->
                        <div class="flex items-center justify-between">
                            <label class="flex items-center">
                                <input type="checkbox" class="rounded border-gray-300 text-blue-600 shadow-sm focus:border-blue-300 focus:ring focus:ring-blue-200 focus:ring-opacity-50">
                                <span class="ml-2 text-sm text-gray-600">记住我</span>
                            </label>
                            <a href="#" class="text-sm text-blue-600 hover:text-blue-500">忘记密码？</a>
                        </div>

                        <!-- 登录按钮 -->
                        <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-lg hover:bg-blue-700 font-medium text-lg form-transition">
                            <i class="fas fa-sign-in-alt mr-2"></i>登录
                        </button>

                        <!-- 分割线 -->
                        <div class="relative my-6">
                            <div class="absolute inset-0 flex items-center">
                                <div class="w-full border-t border-gray-300"></div>
                            </div>
                            <div class="relative flex justify-center text-sm">
                                <span class="px-2 bg-white text-gray-500">或者使用</span>
                            </div>
                        </div>

                        <!-- 第三方登录 -->
                        <div class="grid grid-cols-3 gap-4">
                            <button type="button" class="social-btn flex items-center justify-center py-3 border border-gray-300 rounded-lg hover:bg-gray-50">
                                <i class="fab fa-weixin text-2xl text-green-500"></i>
                            </button>
                            <button type="button" class="social-btn flex items-center justify-center py-3 border border-gray-300 rounded-lg hover:bg-gray-50">
                                <i class="fab fa-qq text-2xl text-blue-500"></i>
                            </button>
                            <button type="button" class="social-btn flex items-center justify-center py-3 border border-gray-300 rounded-lg hover:bg-gray-50">
                                <i class="fab fa-weibo text-2xl text-red-500"></i>
                            </button>
                        </div>

                        <!-- 验证码登录 -->
                        <button type="button" class="w-full border border-blue-600 text-blue-600 py-3 rounded-lg hover:bg-blue-50 font-medium form-transition">
                            <i class="fas fa-sms mr-2"></i>验证码登录
                        </button>
                    </form>
                </div>

                <!-- 注册表单（隐藏） -->
                <div id="register-form" class="hidden">
                    <form class="space-y-6">
                        <!-- 手机号 -->
                        <div class="relative">
                            <input type="tel" class="w-full px-4 py-4 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="手机号">
                            <div class="absolute right-4 top-4 text-gray-400">
                                <i class="fas fa-mobile-alt"></i>
                            </div>
                        </div>

                        <!-- 验证码 -->
                        <div class="flex space-x-3">
                            <input type="text" class="flex-1 px-4 py-4 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="验证码">
                            <button type="button" class="px-6 py-4 bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200 whitespace-nowrap">
                                获取验证码
                            </button>
                        </div>

                        <!-- 设置密码 -->
                        <div class="relative">
                            <input type="password" class="w-full px-4 py-4 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="设置密码">
                            <button type="button" class="absolute right-4 top-4 text-gray-400 hover:text-gray-600">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>

                        <!-- 确认密码 -->
                        <div class="relative">
                            <input type="password" class="w-full px-4 py-4 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="确认密码">
                            <button type="button" class="absolute right-4 top-4 text-gray-400 hover:text-gray-600">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>

                        <!-- 用户协议 -->
                        <div class="flex items-start">
                            <input type="checkbox" class="mt-1 rounded border-gray-300 text-blue-600" required>
                            <span class="ml-2 text-sm text-gray-600">
                                我已阅读并同意
                                <a href="#" class="text-blue-600 hover:text-blue-500">《用户协议》</a>
                                和
                                <a href="#" class="text-blue-600 hover:text-blue-500">《隐私政策》</a>
                            </span>
                        </div>

                        <!-- 注册按钮 -->
                        <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-lg hover:bg-blue-700 font-medium text-lg form-transition">
                            <i class="fas fa-user-plus mr-2"></i>立即注册
                        </button>
                    </form>
                </div>
            </div>

            <!-- 右侧展示区域 -->
            <div class="gradient-bg p-8 lg:p-12 text-white flex items-center">
                <div>
                    <h2 class="text-3xl font-bold mb-6">开启学习之旅</h2>
                    <p class="text-lg mb-8 opacity-90">加入我们，与数万名学员一起学习成长，掌握最新技能，实现职业突破</p>
                    
                    <!-- 特色功能 -->
                    <div class="space-y-6">
                        <div class="flex items-center">
                            <div class="w-12 h-12 bg-white bg-opacity-20 rounded-full flex items-center justify-center mr-4">
                                <i class="fas fa-video text-xl"></i>
                            </div>
                            <div>
                                <h4 class="font-semibold mb-1">高质量课程</h4>
                                <p class="text-sm opacity-80">专业讲师精心制作，内容实用易懂</p>
                            </div>
                        </div>
                        
                        <div class="flex items-center">
                            <div class="w-12 h-12 bg-white bg-opacity-20 rounded-full flex items-center justify-center mr-4">
                                <i class="fas fa-users text-xl"></i>
                            </div>
                            <div>
                                <h4 class="font-semibold mb-1">学习社区</h4>
                                <p class="text-sm opacity-80">与同学交流讨论，共同进步</p>
                            </div>
                        </div>
                        
                        <div class="flex items-center">
                            <div class="w-12 h-12 bg-white bg-opacity-20 rounded-full flex items-center justify-center mr-4">
                                <i class="fas fa-certificate text-xl"></i>
                            </div>
                            <div>
                                <h4 class="font-semibold mb-1">权威认证</h4>
                                <p class="text-sm opacity-80">完成学习获得权威结业证书</p>
                            </div>
                        </div>
                        
                        <div class="flex items-center">
                            <div class="w-12 h-12 bg-white bg-opacity-20 rounded-full flex items-center justify-center mr-4">
                                <i class="fas fa-mobile-alt text-xl"></i>
                            </div>
                            <div>
                                <h4 class="font-semibold mb-1">随时随地</h4>
                                <p class="text-sm opacity-80">支持手机电脑，随时随地学习</p>
                            </div>
                        </div>
                    </div>

                    <!-- 用户数据展示 -->
                    <div class="mt-12 grid grid-cols-2 gap-6">
                        <div class="text-center">
                            <div class="text-2xl font-bold">10万+</div>
                            <div class="text-sm opacity-80">注册用户</div>
                        </div>
                        <div class="text-center">
                            <div class="text-2xl font-bold">500+</div>
                            <div class="text-sm opacity-80">精品课程</div>
                        </div>
                    </div>

                    <!-- 用户评价 -->
                    <div class="mt-8 p-4 bg-white bg-opacity-10 rounded-lg backdrop-blur-sm">
                        <div class="flex items-center mb-2">
                            <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?ixlib=rb-4.0.3&auto=format&fit=crop&w=100&q=80" 
                                 alt="用户头像" class="w-8 h-8 rounded-full mr-2">
                            <div>
                                <p class="text-sm font-medium">张同学</p>
                                <div class="flex text-yellow-400 text-xs">
                                    <i class="fas fa-star"></i>
                                    <i class="fas fa-star"></i>
                                    <i class="fas fa-star"></i>
                                    <i class="fas fa-star"></i>
                                    <i class="fas fa-star"></i>
                                </div>
                            </div>
                        </div>
                        <p class="text-sm opacity-90">"课程质量很高，老师讲解清晰，学到了很多实用技能！"</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 底部链接 -->
        <div class="text-center mt-8 text-gray-500 text-sm">
            <div class="flex items-center justify-center space-x-6">
                <a href="#" class="hover:text-gray-700">关于我们</a>
                <a href="#" class="hover:text-gray-700">帮助中心</a>
                <a href="#" class="hover:text-gray-700">联系客服</a>
                <a href="#" class="hover:text-gray-700">意见反馈</a>
            </div>
            <p class="mt-4">&copy; 2024 稀际课堂 - 知识付费平台. 保留所有权利.</p>
        </div>
    </div>

    <script>
        // 登录注册标签页切换
        document.addEventListener('DOMContentLoaded', function() {
            const tabButtons = document.querySelectorAll('button[class*="tab"]');
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            
            tabButtons.forEach((button, index) => {
                button.addEventListener('click', function() {
                    // 移除所有active状态
                    tabButtons.forEach(btn => {
                        btn.classList.remove('tab-active');
                        btn.classList.add('text-gray-600');
                    });
                    
                    // 添加当前active状态
                    this.classList.add('tab-active');
                    this.classList.remove('text-gray-600');
                    
                    // 切换表单显示
                    if(index === 0) {
                        loginForm.classList.remove('hidden');
                        registerForm.classList.add('hidden');
                    } else {
                        loginForm.classList.add('hidden');
                        registerForm.classList.remove('hidden');
                    }
                });
            });

            // 密码可见性切换
            document.querySelectorAll('[class*="fa-eye"]').forEach(button => {
                button.addEventListener('click', function() {
                    const input = this.parentElement.previousElementSibling;
                    if(input.type === 'password') {
                        input.type = 'text';
                        this.className = this.className.replace('fa-eye', 'fa-eye-slash');
                    } else {
                        input.type = 'password';
                        this.className = this.className.replace('fa-eye-slash', 'fa-eye');
                    }
                });
            });

            // 浮动标签效果
            document.querySelectorAll('input').forEach(input => {
                input.addEventListener('focus', function() {
                    this.parentElement.classList.add('input-focused');
                });
                
                input.addEventListener('blur', function() {
                    if(this.value === '') {
                        this.parentElement.classList.remove('input-focused');
                    }
                });
            });
        });
    </script>
</body>
</html>
